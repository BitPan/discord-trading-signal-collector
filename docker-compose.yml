version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: discord-collector-db
    environment:
      POSTGRES_DB: discord_collector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./src/modules/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d discord_collector"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
